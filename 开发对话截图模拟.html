<title>TRAE 对话 - 短视频文案助手开发记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f7;
    color: #333;
    padding: 20px;
  }

  .scene-selector {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: white;
    padding: 12px 16px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    font-size: 13px;
  }

  .scene-selector select {
    margin-top: 6px;
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }

  .chat-window {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    min-height: 90vh;
    display: flex;
    flex-direction: column;
  }

  /* 顶部栏 */
  .chat-header {
    padding: 16px 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-header .avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .chat-header .info h3 {
    font-size: 16px;
    font-weight: 600;
  }

  .chat-header .info p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }

  /* Session ID */
  .session-bar {
    padding: 8px 24px;
    background: #f8f9fa;
    border-bottom: 1px solid #eee;
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .session-bar .session-id {
    background: #e8f4fd;
    color: #1976d2;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 11px;
  }

  /* 对话区域 */
  .chat-messages {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message {
    display: flex;
    gap: 12px;
    max-width: 85%;
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .message.assistant .message-avatar {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .message.user .message-avatar {
    background: #e0e0e0;
  }

  .message-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
  }

  .message.assistant .message-bubble {
    background: #f5f5f7;
    border-bottom-left-radius: 4px;
  }

  .message.user .message-bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message-bubble h4 {
    font-size: 14px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .message-bubble p {
    margin-bottom: 8px;
  }

  .message-bubble p:last-child {
    margin-bottom: 0;
  }

  .message-bubble ul, .message-bubble ol {
    margin: 8px 0;
    padding-left: 20px;
  }

  .message-bubble li {
    margin-bottom: 4px;
  }

  .message-bubble code {
    background: rgba(0,0,0,0.06);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: monospace;
  }

  .message.user .message-bubble code {
    background: rgba(255,255,255,0.2);
  }

  .message-bubble .highlight-box {
    background: #fff3cd;
    border-left: 3px solid #ffc107;
    padding: 10px 12px;
    border-radius: 0 8px 8px 0;
    margin: 10px 0;
    font-size: 13px;
  }

  .message.user .message-bubble .highlight-box {
    background: rgba(255,255,255,0.15);
    border-left-color: rgba(255,255,255,0.5);
  }

  .message-bubble .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 10px 0;
  }

  .message-bubble .feature-item {
    background: white;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid #eee;
  }

  .message-bubble .feature-item strong {
    display: block;
    margin-bottom: 2px;
    color: #667eea;
  }

  .timestamp {
    font-size: 11px;
    color: #bbb;
    margin-top: 4px;
  }

  .message.user .timestamp {
    text-align: right;
  }

  /* 底部输入栏（装饰用） */
  .chat-input-area {
    padding: 16px 24px;
    border-top: 1px solid #eee;
    background: #fafafa;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    min-height: 40px;
    background: white;
    color: #ccc;
  }

  .send-btn {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }

  /* 截图提示 */
  .screenshot-tip {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: #999;
  }

  .screenshot-tip strong {
    color: #667eea;
  }
</style>
</head>

  function switchScene() {
    const select = document.getElementById('sceneSelect');
    const sceneNum = select.value;
    const scene = scenes[sceneNum];
    
    // 更新 session ID
    document.getElementById('sessionId').textContent = scene.sessionId;
    
    // 生成消息
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    
    scene.messages.forEach(msg => {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${msg.type}`;
      msgEl.innerHTML = `
        <div class="message-avatar">${msg.type === 'assistant' ? '🤖' : '👤'}</div>
        <div>
          <div class="message-bubble">${msg.content}</div>
          <div class="timestamp">${msg.time}</div>
        </div>
      `;
      container.appendChild(msgEl);
    });
    
    // 滚动到底部
    container.scrollTop = container.scrollHeight;
  }

  // 初始化
  switchScene();
</script>
